<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>알까기 사운드 샘플 시청</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{ --bg:#1a1611; --card:#241e15; --ink:#efe8da; --dim:#9a8f7a; --go:#e8a33d; }
  *{margin:0; padding:0; box-sizing:border-box}
  body{background:var(--bg); color:var(--ink); font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; padding:20px; max-width:480px; margin:0 auto}
  h1{font-size:22px; margin:10px 0 4px}
  .sub{color:var(--dim); font-size:13px; margin-bottom:18px}
  h2{font-size:16px; color:var(--go); margin:22px 0 10px}
  button{display:block; width:100%; padding:14px 16px; margin:8px 0; border-radius:12px;
    border:1px solid #4a3f2c; background:var(--card); color:var(--ink);
    font-size:15px; font-weight:700; text-align:left; cursor:pointer}
  button:active{background:#332a1c}
  button small{display:block; font-weight:400; color:var(--dim); font-size:12px; margin-top:3px}
  .note{color:var(--dim); font-size:12px; margin-top:20px; line-height:1.7}
</style>
</head>
<body>
<h1>🔊 알까기 사운드 샘플</h1>
<div class="sub">버튼을 눌러 들어보고 마음에 드는 걸 알려주세요. 반복 클릭 가능.</div>

<h2>① 돌 낙하음 (바둑판에서 떨어질 때)</h2>
<button onclick="fallA()">A. 리얼 — 긁힘+쿵+데구르르 <small>가장자리 긁히고 · 잠깐 낙하 · 바닥에 쿵 하고 구르는 소리</small></button>
<button onclick="fallB()">B. 코믹 — 만화 낙하 휘슬 <small>휘요오오~ 하강 휘슬 + 마지막 "퐁!"</small></button>
<button onclick="fallC()">C. 레트로 — 8비트 추락 <small>옛날 오락실 게임오버풍 하강 아르페지오</small></button>
<button onclick="fallD()">D. 뿅 — 팝 사라짐 <small>짧고 귀에 꽂히는 "뾰옹!" 버블팝</small></button>
<button onclick="fallE()">E. 실로폰 — 똥·땅·둥 <small>실로폰 하강 3음, 경쾌한 코믹</small></button>

<h2>② 마찰음 (돌이 미끄러질 때) — 충돌음과 함께 재생됩니다</h2>
<button onclick="slide('S1')">S1. 리얼 — 돌이 나무를 긁는 소리 <small>까끌한 마찰 노이즈, 속도 줄면 소리도 잦아듦</small></button>
<button onclick="slide('S2')">S2. 부드러운 슈욱— <small>낮고 부드러운 바람 소리 느낌</small></button>
<button onclick="slide('S3')">S3. 코믹 쓔웅~ <small>만화적인 톤 마찰음 (미끄러지는 "쓩" 소리)</small></button>

<div class="note">
  ①에서 하나, ②에서 하나 골라주시면 게임에 바로 적용합니다.<br>
  예: "낙하 B + 마찰 S1" / 조합 자유 (마찰음 없이 낙하음만 교체도 가능)
</div>

<script>
'use strict';
let AC=null, noiseBuf=null, longNoise=null;
function ensure(){
  if(!AC){
    AC=new (window.AudioContext||window.webkitAudioContext)();
    noiseBuf=AC.createBuffer(1, AC.sampleRate*0.06, AC.sampleRate);
    const d=noiseBuf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
    longNoise=AC.createBuffer(1, AC.sampleRate*1.0, AC.sampleRate);
    const d2=longNoise.getChannelData(0);
    for(let i=0;i<d2.length;i++) d2[i]=Math.random()*2-1;
  }
  if(AC.state==='suspended') AC.resume();
}

// ── 공용 부품 ──
function nzBurst(t, dur, filtType, f0, f1, vol, q){
  const src=AC.createBufferSource(); src.buffer=longNoise;
  const f=AC.createBiquadFilter(); f.type=filtType; f.Q.value=q||1;
  f.frequency.setValueAtTime(f0,t);
  if(f1) f.frequency.exponentialRampToValueAtTime(f1,t+dur);
  const g=AC.createGain();
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  src.connect(f).connect(g).connect(AC.destination);
  src.start(t); src.stop(t+dur+0.02);
}
function thud(t, vol, f0=120){
  const o=AC.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(f0,t); o.frequency.exponentialRampToValueAtTime(f0*0.5,t+0.09);
  const g=AC.createGain();
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.11);
  o.connect(g).connect(AC.destination); o.start(t); o.stop(t+0.13);
  nzBurst(t, 0.05, 'lowpass', 400, null, vol*0.7, 0.7);
}
function clack(vol){
  const now=AC.currentTime, v=Math.min(1,vol);
  const src=AC.createBufferSource(); src.buffer=noiseBuf;
  const bp=AC.createBiquadFilter(); bp.type='bandpass';
  bp.frequency.value=2300+Math.random()*900; bp.Q.value=1.1;
  const g1=AC.createGain();
  g1.gain.setValueAtTime(v*1.6,now); g1.gain.exponentialRampToValueAtTime(0.001,now+0.055);
  src.connect(bp).connect(g1).connect(AC.destination); src.start(now);
  const o=AC.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(3100+Math.random()*700,now);
  o.frequency.exponentialRampToValueAtTime(2300,now+0.04);
  const g2=AC.createGain();
  g2.gain.setValueAtTime(v*0.5,now); g2.gain.exponentialRampToValueAtTime(0.001,now+0.045);
  o.connect(g2).connect(AC.destination); o.start(now); o.stop(now+0.06);
  const o2=AC.createOscillator(); o2.type='triangle';
  o2.frequency.setValueAtTime(190,now); o2.frequency.exponentialRampToValueAtTime(85,now+0.05);
  const g3=AC.createGain();
  g3.gain.setValueAtTime(v*0.4,now); g3.gain.exponentialRampToValueAtTime(0.001,now+0.06);
  o2.connect(g3).connect(AC.destination); o2.start(now); o2.stop(now+0.07);
}

// ── ① 낙하음 후보 ──
function fallA(){ ensure(); const t=AC.currentTime;
  nzBurst(t, 0.1, 'bandpass', 1600, 500, 0.4, 1.2);        // 가장자리 긁힘
  thud(t+0.24, 0.6, 115);                                   // 바닥 쿵
  thud(t+0.40, 0.28, 95);                                   // 데굴
  thud(t+0.52, 0.16, 85);                                   // 데굴
  thud(t+0.61, 0.09, 78);                                   // 굴...
}
function fallB(){ ensure(); const t=AC.currentTime;
  const o=AC.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(1350,t);
  o.frequency.exponentialRampToValueAtTime(300,t+0.55);
  const lfo=AC.createOscillator(); lfo.frequency.value=10;
  const lg=AC.createGain(); lg.gain.value=30;
  lfo.connect(lg).connect(o.frequency); lfo.start(t); lfo.stop(t+0.6);
  const g=AC.createGain();
  g.gain.setValueAtTime(0.22,t); g.gain.setValueAtTime(0.22,t+0.45);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.58);
  o.connect(g).connect(AC.destination); o.start(t); o.stop(t+0.6);
  // 퐁!
  const o2=AC.createOscillator(); o2.type='sine';
  o2.frequency.setValueAtTime(130,t+0.6); o2.frequency.exponentialRampToValueAtTime(70,t+0.72);
  const g2=AC.createGain();
  g2.gain.setValueAtTime(0.5,t+0.6); g2.gain.exponentialRampToValueAtTime(0.001,t+0.75);
  o2.connect(g2).connect(AC.destination); o2.start(t+0.6); o2.stop(t+0.78);
  nzBurst(t+0.6, 0.04, 'lowpass', 500, null, 0.3, 0.7);
}
function fallC(){ ensure(); const t=AC.currentTime;
  [659,523,440,349,262].forEach((f,i)=>{
    const tt=t+i*0.09;
    const o=AC.createOscillator(); o.type='square'; o.frequency.value=f;
    const g=AC.createGain();
    g.gain.setValueAtTime(0.14,tt); g.gain.exponentialRampToValueAtTime(0.001,tt+0.085);
    o.connect(g).connect(AC.destination); o.start(tt); o.stop(tt+0.09);
  });
  thud(t+0.5, 0.4, 100);
}
function fallD(){ ensure(); const t=AC.currentTime;
  const o=AC.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(500,t);
  o.frequency.exponentialRampToValueAtTime(1400,t+0.11);
  const g=AC.createGain();
  g.gain.setValueAtTime(0.35,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  o.connect(g).connect(AC.destination); o.start(t); o.stop(t+0.16);
  nzBurst(t+0.1, 0.035, 'highpass', 2500, null, 0.45, 0.8);  // 팝!
}
function fallE(){ ensure(); const t=AC.currentTime;
  [880,659,440].forEach((f,i)=>{
    const tt=t+i*0.13;
    const o=AC.createOscillator(); o.type='triangle'; o.frequency.value=f;
    const o2=AC.createOscillator(); o2.type='sine'; o2.frequency.value=f*3;  // 밝은 배음
    const g=AC.createGain(), g2=AC.createGain();
    g.gain.setValueAtTime(0.3,tt); g.gain.exponentialRampToValueAtTime(0.001,tt+0.22);
    g2.gain.setValueAtTime(0.08,tt); g2.gain.exponentialRampToValueAtTime(0.001,tt+0.08);
    o.connect(g).connect(AC.destination); o2.connect(g2).connect(AC.destination);
    o.start(tt); o.stop(tt+0.25); o2.start(tt); o2.stop(tt+0.1);
  });
}

// ── ② 마찰음 후보 (충돌 → 미끄러지며 감속 시뮬레이션) ──
function slide(type){
  ensure();
  clack(0.85);
  const dur=1.7, steps=50, t0=AC.currentTime+0.04;
  let src, filt, g=AC.createGain();
  if(type==='S3'){
    src=AC.createOscillator(); src.type='sawtooth';
    filt=AC.createBiquadFilter(); filt.type='lowpass'; filt.Q.value=2;
  } else {
    src=AC.createBufferSource(); src.buffer=longNoise; src.loop=true;
    filt=AC.createBiquadFilter();
    filt.type = type==='S1' ? 'bandpass' : 'lowpass';
    filt.Q.value = type==='S1' ? 0.9 : 0.6;
  }
  for(let i=0;i<=steps;i++){
    const t=t0+i*dur/steps;
    const sp=12*Math.pow(0.945,i);                 // 마찰 감속 곡선
    let vol, fq;
    if(type==='S1'){ vol=Math.min(0.4, sp*0.038); fq=700+sp*90; }
    if(type==='S2'){ vol=Math.min(0.3, sp*0.030); fq=350+sp*95; }
    if(type==='S3'){ vol=Math.min(0.22, sp*0.020); fq=900+sp*70;
      src.frequency.setValueAtTime(140+sp*22, t); }
    g.gain.linearRampToValueAtTime(vol, t);
    filt.frequency.linearRampToValueAtTime(fq, t);
  }
  g.gain.linearRampToValueAtTime(0.0001, t0+dur+0.05);
  src.connect(filt).connect(g).connect(AC.destination);
  src.start(t0); src.stop(t0+dur+0.1);
}
</script>
</body>
</html>
